<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana - 260612</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Source Han Serif SC','Noto Serif SC',serif;background:#f5f5f5;padding:20px}
  .container{max-width:720px;margin:0 auto}
  h1{text-align:center;color:#1A56DB;font-size:20px;margin-bottom:2px}
  .date{text-align:center;color:#888;font-size:13px;margin-bottom:16px}

  .row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #eee;gap:8px}
  .row.gram{border-bottom:1px solid #d0e1fd}
  .zh{font-size:17px;font-weight:bold;flex:1;min-width:0;overflow:hidden;color:#333}
  .py{font-size:13px;color:#999;flex:1;min-width:0;overflow:hidden;font-style:italic}
  .en{font-size:13px;color:#555;flex:1;min-width:0;overflow:hidden;word-break:break-word}

  .play{width:32px;height:32px;border:none;border-radius:50%;background:#E8F0FE;color:#1A56DB;font-size:15px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
  .play:hover{background:#1A56DB;color:#fff}
  .play-placeholder{width:32px;flex-shrink:0}

  .play-all{display:block;margin:0 auto 16px;padding:9px 24px;border:none;border-radius:8px;background:#1A56DB;color:#fff;font-size:14px;cursor:pointer}
  .play-all:hover{background:#1548b8}
  .sec{background:#e8f0fe;color:#1A56DB;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:bold;margin:14px 0 4px;display:inline-block}
  .back{display:inline-block;color:#1A56DB;text-decoration:none;font-size:13px;margin-bottom:10px}.back:hover{text-decoration:underline}
  .lesson-label{text-align:center;color:#1A56DB;font-size:13px;font-weight:bold;padding:10px 0 6px;margin-top:8px;border-top:2px solid #1A56DB}
  .footer{text-align:center;color:#aaa;font-size:11px;margin-top:16px}
</style>
</head>
<body>
<div class="container">
<a class="back" href="../">&larr; Diana</a>
<h1>Diana - Class Notes</h1>
<p class="date">260612 &nbsp;|&nbsp; 🔊 Click ▶ to hear pronunciation</p>
<button class="play-all" onclick="playAll()">▶ Play All Vocabulary &amp; Sentences</button>

        <div class="row" style="background:#FFFFFF">
          <button class="play" onclick="play(0)">▶</button>
          <span class="zh">???</span>
          <span class="py">w? de shu?</span>
          <span class="en">my water</span>
        </div>
        <div class="row" style="background:#FFFFFF">
          <button class="play" onclick="play(1)">▶</button>
          <span class="zh">???</span>
          <span class="py">w? m? ma</span>
          <span class="en">my mom</span>
        </div>
<p class="footer" id="footerMsg">Detecting voice...</p>
</div>
<audio id="player" preload="none" referrerpolicy="no-referrer"></audio>
<script>
const texts = ['???','???'];
document.getElementById('footerMsg').textContent = 'Click ▶ to hear pronunciation';

// Pre-detect Chinese TTS voices (hz=false on Windows without Chinese lang pack)
var hz = false;
function cv() {
  var v = window.speechSynthesis.getVoices();
  hz = v.some(function(x) { return x.lang.startsWith('zh'); });
}
cv();
if (window.speechSynthesis.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = cv;
}

function play(i) {
  var text = typeof i === "number" ? texts[i] : i;
  if (hz) {
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 0.9;
    var voices = speechSynthesis.getVoices();
    var zhVoice = voices.find(function(v) { return v.lang.startsWith('zh'); });
    if (zhVoice) u.voice = zhVoice;
    // Timeout fallback: Web Speech API may silently fail without triggering onerror
    var fb = setTimeout(function() {
      try { speechSynthesis.cancel(); } catch(e) {}
      var p = document.getElementById('player');
      p.src = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&q=' + encodeURIComponent(text) + '&client=tw-ob';
      p.play();
    }, 2500);
    u.onstart = function() { clearTimeout(fb); };
    u.onerror = function() {
      clearTimeout(fb);
      var p = document.getElementById('player');
      p.src = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&q=' + encodeURIComponent(text) + '&client=tw-ob';
      p.play();
    };
    try { speechSynthesis.cancel(); } catch(e) {}
    try { speechSynthesis.speak(u); } catch(e) {
      var p = document.getElementById('player');
      p.src = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&q=' + encodeURIComponent(text) + '&client=tw-ob';
      p.play();
    }
  } else {
    var p = document.getElementById('player');
    p.src = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&q=' + encodeURIComponent(text) + '&client=tw-ob';
    p.play();
  }
}

function playAll() {
  let i = 0;
  function n() {
    if (i >= texts.length) return;
    play(i);
    i++;
    setTimeout(n, 1300);
  }
  n();
}
</script>
</body>
</html>
