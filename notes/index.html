<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Student Notes</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Source Han Serif SC','Noto Serif SC',serif;background:#f5f5f5;padding:20px}
.container{max-width:720px;margin:0 auto}h1{text-align:center;color:#1A56DB;font-size:20px;margin-bottom:2px}.sub{text-align:center;color:#888;font-size:12px;margin-bottom:20px}
.back{display:inline-block;color:#1A56DB;text-decoration:none;font-size:13px;margin-bottom:10px}.back:hover{text-decoration:underline}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin:14px 0}
.card{display:block;text-decoration:none;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:22px 18px;text-align:center;transition:.15s}.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:#1A56DB}
.card .avatar{width:48px;height:48px;border-radius:50%;background:#E8F0FE;color:#1A56DB;font-size:22px;font-weight:bold;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.card .name{font-size:15px;font-weight:bold;color:#333;margin-bottom:2px}
.card .info{font-size:11px;color:#999}
</style></head>
<body><div class="container">
<a class="back" href="../">&larr; Chinese-notes</a>
<h1>Student Notes</h1><p class="sub">Click a student to browse their lessons</p>
<div class="grid">
<a class="card" href="adam-k/">
<div class="avatar">AK</div>
<div class="name">Adam K.</div>
<div class="info">1 lesson &middot; June 2026</div>
</a>
</div>
<p style="text-align:center;color:#bbb;font-size:12px;margin-top:20px">More students coming soon &hellip;</p>
</div></body></html>
