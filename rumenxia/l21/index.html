<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第21课 看比赛</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Source Han Serif SC','Noto Serif SC',serif;background:#f5f5f5;padding:20px}.container{max-width:720px;margin:0 auto}h1{text-align:center;color:#1A56DB;font-size:20px;margin-bottom:2px}.sub{text-align:center;color:#888;font-size:12px;margin-bottom:14px}.back{display:inline-block;color:#1A56DB;text-decoration:none;font-size:13px;margin-bottom:10px}.back:hover{text-decoration:underline}.sec{background:#e8f0fe;color:#1A56DB;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:bold;margin:14px 0 4px;display:inline-block}.row{display:flex;align-items:center;padding:7px 10px;border-bottom:1px solid #eee;gap:6px}.row.gram{background:#E8F0FE;border-bottom:1px solid #d0e1fd;flex-wrap:wrap}.zh{font-size:15px;font-weight:bold;flex:1;min-width:0;color:#333}.py{font-size:11px;color:#999;flex:1;min-width:0;font-style:italic}.en{font-size:11px;color:#555;flex:1;min-width:0;word-break:break-word}.play{width:28px;height:28px;border:none;border-radius:50%;background:#E8F0FE;color:#1A56DB;font-size:13px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}.play:hover{background:#1A56DB;color:#fff}.play-placeholder{width:28px;flex-shrink:0}.play-all{display:block;margin:10px auto;padding:7px 20px;border:none;border-radius:8px;background:#1A56DB;color:#fff;font-size:13px;cursor:pointer}</style></head>
<body><div class="container"><div class="back"><a href="../" style="color:#1A56DB;text-decoration:none">&larr; Back</a></div>
<h1>第21课 看比赛</h1><p class="sub">Lesson 21 &middot; Watching the Game</p>
<button class="play-all" onclick="playAll()">&#9654; Play All</button>
<div class="sec">&#128214; Vocabulary</div>

</div>
<audio id="player" preload="none" referrerpolicy="no-referrer"></audio>
<script>try{var p=document.getElementById('player');var hz=false;function cv(){try{var v=window.speechSynthesis.getVoices();hz=v.some(function(x){return x.lang.startsWith('zh')})}catch(e){}}try{cv()}catch(e){}if(window.speechSynthesis&&window.speechSynthesis.onvoiceschanged!==undefined){window.speechSynthesis.onvoiceschanged=cv}function play(t){var c=t;if(hz){try{var u=new SpeechSynthesisUtterance(c);u.lang='zh-CN';u.rate=.9;var fb=setTimeout(function(){try{speechSynthesis.cancel()}catch(e){}p.src='https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&client=tw-ob&q='+encodeURIComponent(c);p.play()},2500);u.onstart=function(){clearTimeout(fb)};u.onerror=function(){clearTimeout(fb);p.src='https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&client=tw-ob&q='+encodeURIComponent(c);p.play()};speechSynthesis.cancel();speechSynthesis.speak(u)}catch(e){p.src='https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&client=tw-ob&q='+encodeURIComponent(c);p.play()}}else{p.src='https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&client=tw-ob&q='+encodeURIComponent(c);p.play()}}function playAll(){var a=[];var i=0;function n(){if(i>=a.length)return;play(a[i]);i++;setTimeout(n,2000)}n()}}catch(e){}</script>
</body></html>
