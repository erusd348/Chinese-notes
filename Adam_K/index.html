// Pre-detect Chinese TTS voices (hz=false on Windows without Chinese lang pack)
var hz = false;
function cv() {
  var v = window.speechSynthesis.getVoices();
  hz = v.some(function(x) { return x.lang.startsWith('zh'); });
}
cv();
if (window.speechSynthesis.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = cv;
}

function play(i) {
  var text = typeof i === "number" ? texts[i] : i;
  if (hz) {
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 0.9;
    var voices = speechSynthesis.getVoices();
    var zhVoice = voices.find(function(v) { return v.lang.startsWith('zh'); });
    if (zhVoice) u.voice = zhVoice;
    // Timeout fallback: Web Speech API may silently fail without triggering onerror
    var fb = setTimeout(function() {
      try { speechSynthesis.cancel(); } catch(e) {}
      var p = document.getElementById('player');
      p.src = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&q=' + encodeURIComponent(text) + '&client=tw-ob';
      p.play();
    }, 2500);
    u.onstart = function() { clearTimeout(fb); };
    u.onerror = function() {
      clearTimeout(fb);
      var p = document.getElementById('player');
      p.src = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&q=' + encodeURIComponent(text) + '&client=tw-ob';
      p.play();
    };
    try { speechSynthesis.cancel(); } catch(e) {}
    try { speechSynthesis.speak(u); } catch(e) {
      var p = document.getElementById('player');
      p.src = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&q=' + encodeURIComponent(text) + '&client=tw-ob';

    p.play();
  }
}

function playAll() {
  let i = 0;

    if (i >= texts.length) return;

}
